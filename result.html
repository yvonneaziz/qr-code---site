<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Result</title>
</head>
<body>

  <h2 id="staffDisplay"></h2>

  <img src="image.jpg" alt="Result Image" style="max-width: 300px;">

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    document.getElementById("staffDisplay").textContent =
      id ? "Staff ID: " + id : "No ID provided";
  </script>

</body>
</html>
